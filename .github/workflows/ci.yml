name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # Flutter App Tests
  # ---------------------------------------------------------------
  flutter:
    name: Flutter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage

  # ---------------------------------------------------------------
  # Edge Functions (Deno) Tests
  # ---------------------------------------------------------------
  edge-functions:
    name: Edge Functions (Deno)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run Deno checks
        run: >
          cd supabase/functions &&
          deno fmt --check */index.ts _shared/*.ts tests/*.ts &&
          deno lint --config deno.json */index.ts _shared/*.ts tests/*.ts &&
          deno check --config deno.json */index.ts _shared/*.ts tests/*.ts &&
          deno test --config deno.json --allow-env --allow-read tests
